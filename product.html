<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Product</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="product-container">

  <div class="product-image">
    <img id="p-img">
  </div>

  <div class="product-details">
    <h1 id="p-name"></h1>
    <h2 id="p-price"></h2>

    <div class="buttons">
      <button class="cart-btn" onclick="addToCart()">Add to Cart</button>
      <button class="buy-btn" onclick="goToCart()">Buy Now</button>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
